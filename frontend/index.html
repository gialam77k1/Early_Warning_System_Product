<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — EWS Platform</title>
  <link rel="icon" type="image/png" href="img/logo.png"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="auth-brand">
      <img src="img/logo.png" alt="EWS Platform logo" class="auth-brand-logo"/>
      <h1>EWS Platform</h1>
    </div>
    <p>Sign in to your account to continue</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input id="username" type="text" class="form-control" placeholder="Enter your username" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required/>
      </div>

      <div id="loginError" class="login-error"></div>

      <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%; padding:14px; margin-top:16px;">Sign In</button>
    </form>

    <p style="text-align:center; font-size:13px; color:var(--text-secondary); margin-top:24px;">
      Don't have an account? <a href="register.html" style="font-weight:700">Register</a>
    </p>

    <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:16px;">
      © 2026 EWS Platform · IUH
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (api.isLoggedIn()) redirectByRole(api.getUser());

  function redirectByRole(user) {
    if (!user) return;
    const map = { admin: 'admin.html', teacher: 'teacher.html', student: 'student.html' };
    window.location.href = map[user.vai_tro] || 'admin.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errBox = document.getElementById('loginError');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errBox.style.display = 'none';

    const result = await api.login(username, password);

    if (result.ok) {
      btn.textContent = 'Success!';
      setTimeout(() => redirectByRole(result.user), 400);
    } else {
      errBox.textContent = 'Error: ' + result.msg;
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
