<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — EWS Platform</title>
  <link rel="shortcut icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" href="img/logo.png"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="auth-brand">
      <img src="img/logo.png" alt="EWS Platform logo" class="auth-brand-logo"/>
      <h1>EWS Platform</h1>
    </div>
    <p>Create a new student account</p>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="ho_ten" type="text" class="form-control" placeholder="Nguyen Van A" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="email" type="email" class="form-control" placeholder="email@example.com" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input id="username" type="text" class="form-control" placeholder="Choose a username" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required minlength="6"/>
      </div>

      <div id="registerError" class="login-error"></div>

      <button type="submit" class="btn btn-primary" id="registerBtn" style="width:100%; padding:14px; margin-top:16px;">Create Account</button>
    </form>

    <p style="text-align:center; font-size:13px; color:var(--text-secondary); margin-top:24px;">
      Already have an account? <a href="index.html" style="font-weight:700">Sign In</a>
    </p>

    <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:16px;">
      © 2026 EWS Platform · IUH
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (api.isLoggedIn()) {
    const u = api.getUser();
    const map = { admin: 'admin.html', teacher: 'teacher.html', student: 'student.html' };
    window.location.href = map[u.vai_tro] || 'index.html';
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const errBox = document.getElementById('registerError');

    const ho_ten   = document.getElementById('ho_ten').value.trim();
    const email    = document.getElementById('email').value.trim();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Creating account...';
    errBox.style.display = 'none';

    try {
      const resp = await fetch('/api/auth/public-register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ho_ten, email, username, password }),
      });

      const data = await resp.json();

      if (resp.ok) {
        localStorage.setItem('ews_access',  data.access);
        localStorage.setItem('ews_refresh', data.refresh);
        localStorage.setItem('ews_user',    JSON.stringify(data.user));
        btn.textContent = 'Success!';
        setTimeout(() => { window.location.href = 'student.html'; }, 500);
      } else {
        const msg = Object.values(data).flat().join(', ') || 'Registration failed';
        errBox.textContent = msg;
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    } catch (err) {
      errBox.textContent = 'Network error. Please try again.';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
