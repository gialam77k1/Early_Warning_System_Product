services:
  - type: web
    name: ews-backend
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DB_NAME
        fromDatabase:
          name: ews-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ews-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ews-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: ews-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ews-db
          property: port
      - key: MLFLOW_TRACKING_URI
        value: file:///app/mlruns

databases:
  - name: ews-db
    databaseName: early_warning_db
    user: ewsuser
    plan: free
